<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="silverTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#dedcd6"/>
    </linearGradient>
    <linearGradient id="silverBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dedcd6"/>
      <stop offset="1" stop-color="#c0beb8"/>
    </linearGradient>
    <linearGradient id="blackTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="blackBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="1" stop-color="#1c1c1c"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#fafaf7"/>

  <!-- film roll (top) -->
  <rect x="96" y="56" width="320" height="116" fill="#837070"/>
  <rect x="116" y="84" width="48" height="22" rx="11" fill="#d3d3d3"/>
  <rect x="116" y="124" width="48" height="22" rx="11" fill="#d3d3d3"/>
  <rect x="348" y="84" width="48" height="22" rx="11" fill="#d3d3d3"/>
  <rect x="348" y="124" width="48" height="22" rx="11" fill="#d3d3d3"/>

  <!-- spool -->
  <rect x="32" y="244" width="44" height="148" fill="#333" stroke="#000" stroke-width="2"/>

  <!-- cassette body -->
  <rect x="56" y="172" width="412" height="288" fill="#ffb55f" stroke="#1a1a1a" stroke-width="3"/>

  <!-- label divider -->
  <line x1="56" y1="252" x2="468" y2="252" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>

  <!-- "DX" text in label -->
  <text x="262" y="228" text-anchor="middle"
        font-family="Helvetica, 'Arial Narrow', Arial, sans-serif"
        font-weight="800" font-size="44" fill="#8a1a0f"
        letter-spacing="3">DX</text>

  <!-- 6x2 checker grid (ISO 200/24°, 36 exp, ±1/2) -->
  <g transform="translate(76, 268)">
    <!-- row 1: 1 1 1 0 1 0 -->
    <rect x="0"   y="0"  width="60" height="86" fill="url(#silverTop)"/>
    <rect x="62"  y="0"  width="60" height="86" fill="url(#silverTop)"/>
    <rect x="124" y="0"  width="60" height="86" fill="url(#silverTop)"/>
    <rect x="186" y="0"  width="60" height="86" fill="url(#blackTop)"/>
    <rect x="248" y="0"  width="60" height="86" fill="url(#silverTop)"/>
    <rect x="310" y="0"  width="60" height="86" fill="url(#blackTop)"/>
    <!-- row 2: 1 0 0 1 0 0 -->
    <rect x="0"   y="88" width="60" height="86" fill="url(#silverBot)"/>
    <rect x="62"  y="88" width="60" height="86" fill="url(#blackBot)"/>
    <rect x="124" y="88" width="60" height="86" fill="url(#blackBot)"/>
    <rect x="186" y="88" width="60" height="86" fill="url(#silverBot)"/>
    <rect x="248" y="88" width="60" height="86" fill="url(#blackBot)"/>
    <rect x="310" y="88" width="60" height="86" fill="url(#blackBot)"/>
  </g>
</svg>
